<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      let movies = await DataMovie.requestMovies();
      let profiles = await DataProfile.requestProfiles();
      let test = [];

      window.C = {};
      C.handlerMovieDetail = async function (id) {
        let selectedMovie = await DataMovie.requestMovieDetails(id);
        if (selectedMovie) {
          V.renderMovieDetail(selectedMovie);
        }
      };
      C.handlerCloseMovieDetail = function (id) {
        V.renderMovies(movies, "C.handlerMovieDetail");
      };
      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.start = function () {
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerCloseMovieDetail()",
          profiles,
        );
        V.renderMovieCategory(movies);
      };
      C.handleHomeClick = function () {
        V.renderMovieCategory(movies);
      };
      C.handleProfileSelect = function (profileName) {
        console.log("Profil sélectionné: " + profileName);
      };
      window.V = {};

      V.renderNavBar = function (hAbout, hHome, profiles) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome, profiles);
      };
      V.renderMovies = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML = Movie.format(data);
      };
      V.renderMovieDetail = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(data);
      };
      V.renderMovieCategory = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieCategory(data);
      };
      C.start();
    </script>
  </body>
</html>
