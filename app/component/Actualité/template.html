<section class="Actu">
  <ul class="Actu__carroussel">
    <li class="Actu__movie">
      <iframe
        width="560"
        height="315"
        src="{{url_trailer}}"
        title="{{titre_film}}"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
        "
        allowfullscreen
      >
      </iframe>
    </li>
  </ul>
</section>
